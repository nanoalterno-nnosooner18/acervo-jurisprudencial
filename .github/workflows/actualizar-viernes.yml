name: Actualizar acervo (viernes)

on:
  schedule:
    # Viernes 22:00 UTC = viernes 16:00 hora CDMX (la SCJN publica los viernes por la mañana)
    - cron: '0 22 * * 5'
  workflow_dispatch:   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright python-docx openpyxl
          python -m playwright install --with-deps chromium

      - name: Buscar tesis nuevas en el SJF
        id: scrape
        run: |
          python scripts/scraper_sjf.py | tee scrape_log.txt
        continue-on-error: true

      - name: Regenerar archivos del acervo
        run: python scripts/build.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "acervo-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios esta semana."
          else
            git commit -m "Actualizacion semanal automatica $(date +%Y-%m-%d)"
            git push
          fi
